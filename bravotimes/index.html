<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Our Hopeful Story</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ════════════════════════════
       테마 CSS 변수
    ════════════════════════════ */
    :root {
      --bg:          #000000;
      --bg-sub:      #0d0d0d;
      --text-hi:     #ffffff;
      --text-mid:    #dcdcdc;
      --text-lo:     #777777;
      --text-mute:   #484848;
      --border-hi:   #333333;
      --border-lo:   #1f1f1f;
      --accent:      #ffffff;
      --hover-img:   0.45;
    }
    html.theme-burgundy {
      --bg:          #120006;
      --bg-sub:      #1e000d;
      --text-hi:     #f5e6ea;
      --text-mid:    #d4a0b0;
      --text-lo:     #9a6070;
      --text-mute:   #6b3545;
      --border-hi:   #5c1a2e;
      --border-lo:   #2e0815;
      --accent:      #c0395a;
      --hover-img:   0.35;
    }
    html.theme-white {
      --bg:          #ffffff;
      --bg-sub:      #f4f4f4;
      --text-hi:     #111111;
      --text-mid:    #333333;
      --text-lo:     #666666;
      --text-mute:   #999999;
      --border-hi:   #cccccc;
      --border-lo:   #e5e5e5;
      --accent:      #111111;
      --hover-img:   0.5;
    }

    html, body {
      background: var(--bg);
      color: var(--text-hi);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body { display: flex; }

    /* ── 저작권 보호 ── */
    * { -webkit-user-select: none; -moz-user-select: none; user-select: none; }
    img { -webkit-user-drag: none; pointer-events: none; }
    a, button { pointer-events: auto; }

    /* ── 사이드바 ── */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 250px;
      min-width: 220px;
      padding: 60px 28px 60px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      border-right: 1px solid var(--border-lo);
      overflow-y: auto;
    }
    .sidebar h1 { font-size: 20px; font-weight: 700; color: var(--text-hi); line-height: 1.3; letter-spacing: -0.02em; }
    .sidebar h2 { font-size: 12px; font-weight: 400; color: var(--text-mid); line-height: 1.9; letter-spacing: 0.01em; }
    .sidebar h3 { font-size: 11px; font-weight: 400; color: var(--text-mute); line-height: 2.1; letter-spacing: 0.02em; }
    .sidebar h3 a { color: var(--text-mute); text-decoration: none; transition: color 0.2s; }
    .sidebar h3 a:hover { color: var(--text-hi); }
    .divider { width: 28px; height: 1px; background: var(--border-hi); }

    .sidebar-img { width: 100%; aspect-ratio: 9 / 16; overflow: hidden; border-radius: 3px; background: var(--bg-sub); }
    .sidebar-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── 테마 스위처 ── */
    .theme-switcher {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .theme-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      padding: 0;
      flex-shrink: 0;
    }
    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn.active { border-color: var(--text-hi); }
    .theme-btn.t-black    { background: #1a1a1a; box-shadow: inset 0 0 0 1px #444; }
    .theme-btn.t-burgundy { background: #8b0023; }
    .theme-btn.t-white    { background: #f0f0f0; box-shadow: inset 0 0 0 1px #ccc; }

    /* ── 메인 그리드 ── */
    .main { flex: 1; padding: 60px 40px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px 20px; }

    .img-block { display: flex; flex-direction: column; gap: 10px; cursor: pointer; text-decoration: none; }

    .img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border-radius: 3px;
      background: var(--bg-sub);
    }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease, opacity 0.3s ease; }
    .img-block:hover .img-wrap img { transform: scale(1.03); opacity: var(--hover-img); }

    .img-hover-title {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0;
      transition: opacity 0.3s ease; pointer-events: none;
    }
    .img-hover-title span {
      font-size: 15px; font-weight: 400; color: var(--text-hi);
      text-align: center; line-height: 1.55; letter-spacing: 0.01em;
    }
    .img-block:hover .img-hover-title { opacity: 1; }

    .img-block h1 { font-size: 20px; font-weight: 700; color: var(--text-hi); letter-spacing: 0.01em; line-height: 1.3; }

    /* ── 반응형 ── */
    @media (max-width: 1024px) { .sidebar { width: 180px; min-width: 180px; padding: 48px 20px 48px 28px; } }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar {
        position: static; height: auto; width: 100%; min-width: unset;
        padding: 40px 24px 32px; border-right: none;
        border-bottom: 1px solid var(--border-lo);
        flex-direction: row; flex-wrap: wrap; gap: 16px; align-items: flex-start;
      }
      .sidebar h1 { width: 100%; font-size: 22px; }
      .sidebar h2 { width: 100%; }
      .divider { display: none; }
      .main { padding: 32px 24px; }
      .grid { gap: 20px 14px; }
    }
    @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <h1>Our Hopeful Story</h1>
    <div class="divider"></div>
    <h2>Writing Our Stories</h2>
    <h2>Here are our stories of moving forward with hope, not despair.</h2>
    <div class="divider"></div>
    <div>
      <h3><a href="mailto:info@ourhopefulstory.com">info@ourhopefulstory.com</a></h3>
      <h3>Seoul, South Korea</h3>
    </div>
    <div class="sidebar-img">
      <img src="images/7be4ec07-cda5-ead4-5bf3-84f555843337.gif" alt="" />
    </div>

    <!-- 테마 스위처 -->
    <div class="theme-switcher">
      <button class="theme-btn t-black    active" id="btn-black"    onclick="setTheme('black')"    title="Black"></button>
      <button class="theme-btn t-burgundy"        id="btn-burgundy" onclick="setTheme('burgundy')" title="Burgundy"></button>
      <button class="theme-btn t-white"           id="btn-white"    onclick="setTheme('white')"    title="White"></button>
    </div>

    <h3>2026 Our Hopeful Story. All Rights Reserved.</h3>
  </aside>

  <main class="main">
    <div class="grid">

      <a class="img-block" href="detail.html?id=1">
        <div class="img-wrap">
          <img src="images/story01/CambodiaMain.jpg" alt="" />
          <div class="img-hover-title"><span>Building Bridges of Hope: Inspiring Encounters with Cambodian Children</span></div>
        </div>
        <h1></h1>
      </a>

      <a class="img-block" href="detail.html?id=2">
        <div class="img-wrap">
          <img src="images/story02/hello.jpg" alt="" />
          <div class="img-hover-title"><span>Easter</span></div>
        </div>
        <h1></h1>
      </a>

    </div>
  </main>

  <script>
    /* ── 테마 ── */
    const THEMES = ['black', 'burgundy', 'white'];

    function setTheme(theme) {
      html.classList.remove(...THEMES.map(t => 'theme-' + t));
      if (theme !== 'black') html.classList.add('theme-' + theme);
      localStorage.setItem('ohs-theme', theme);
      THEMES.forEach(t => {
        document.getElementById('btn-' + t).classList.toggle('active', t === theme);
      });
    }

    const html = document.documentElement;
    const saved = localStorage.getItem('ohs-theme') || 'black';
    setTheme(saved);

    /* ── 저작권 보호 ── */
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      const blocked =
        ((e.ctrlKey || e.metaKey) && ['s','c','u','p','a'].includes(e.key.toLowerCase())) ||
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()));
      if (blocked) e.preventDefault();
    });
    document.addEventListener('dragstart', e => e.preventDefault());
    document.querySelectorAll('img').forEach(img => {
      const wrap = img.parentElement;
      if (getComputedStyle(wrap).position === 'static') wrap.style.position = 'relative';
      const s = document.createElement('div');
      s.style.cssText = 'position:absolute;inset:0;z-index:1;';
      wrap.appendChild(s);
    });
    console.log('%c© Our Hopeful Story — All rights reserved.', 'color:#fff;background:#000;font-size:14px;padding:8px 16px;');
    
    /* ── Watermark ── */
    (function () {

      // ① 세션마다 고유 ID (브라우저 닫으면 초기화)
      const getUserId = () => {
        let id = sessionStorage.getItem('wm_id');
        if (!id) {
          id = 'OHS-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
          sessionStorage.setItem('wm_id', id);
        }
        return id;
      };

      const USER_ID = getUserId();

      // ② 현재 시각 포맷
      const getTimestamp = () => new Date().toLocaleString('ko-KR', {
        year:'numeric', month:'2-digit', day:'2-digit',
        hour:'2-digit', minute:'2-digit', second:'2-digit'
      });

      // ③ 이미지마다 항상 보이는 워터마크 부착
      //    — 우하단: 작고 반투명 (평소에도 표시)
      //    — 캡처 시도 시: 전체 overlay로 강화
      function attachWatermark(img) {
        if (img.dataset.wmDone) return;
        img.dataset.wmDone = '1';

        const parent = img.parentElement;
        if (getComputedStyle(parent).position === 'static') parent.style.position = 'relative';

        // 평소 워터마크 — 항상 표시, 스크린샷에 찍힘
        const wm = document.createElement('div');
        wm.className = 'wm-label';
        wm.style.cssText = `
          position:absolute; bottom:6px; right:6px;
          font-size:10px; font-family:Arial,sans-serif;
          color:rgba(255,255,255,0.01);
          background:rgba(0,0,0,0.01);
          padding:2px 7px; border-radius:3px;
          pointer-events:none; z-index:9999;
          letter-spacing:0.03em;
          transition: opacity 0.2s;
        `;
        wm.textContent = `© OHS | ${USER_ID}`;
        parent.appendChild(wm);
      }

      // ④ 캡처 감지 시 — 타임스탬프 포함 강화 overlay 표시
      let alertActive = false;
      function triggerWM() {
        if (alertActive) return;
        alertActive = true;

        const ts = getTimestamp();

        // 기존 wm-label 텍스트 업데이트 (시각 포함)
        document.querySelectorAll('.wm-label').forEach(wm => {
          wm.textContent = `© Our Hopeful Story | ${USER_ID} | ${ts}`;
          wm.style.color = 'rgba(255,255,255,0.01)';
          wm.style.background = 'rgba(0,0,0,0.1)';
          wm.style.fontSize = '11px';
        });

        // 전체 이미지에 경고 overlay
        document.querySelectorAll('img').forEach(img => {
          const parent = img.parentElement;
          if (parent.querySelector('.wm-overlay')) return;

          const overlay = document.createElement('div');
          overlay.className = 'wm-overlay';
          overlay.innerHTML = `
            <span style="font-size:13px;font-weight:600;letter-spacing:0.05em;">⚠ CONTENT PROTECTED</span>
            <span style="font-size:10px;margin-top:4px;opacity:0.8;">© Our Hopeful Story</span>
            <span style="font-size:9px;margin-top:2px;opacity:0.6;">${USER_ID} | ${ts}</span>
          `;
          overlay.style.cssText = `
            position:absolute; inset:0;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center; gap:0;
            color:#fff; background:rgba(0,0,0,0.01);
            z-index:10000; pointer-events:none;
            font-family:Arial,sans-serif; text-align:center;
            padding:12px;
          `;
          parent.appendChild(overlay);
        });

        // 5초 후 초기화 (정상 사용 복원)
        setTimeout(() => {
          document.querySelectorAll('.wm-overlay').forEach(el => el.remove());
          document.querySelectorAll('.wm-label').forEach(wm => {
            wm.textContent = `© OHS | ${USER_ID}`;
            wm.style.color = 'rgba(255,255,255,0.05)';
            wm.style.background = 'rgba(0,0,0,0.05)';
            wm.style.fontSize = '10px';
          });
          alertActive = false;
        }, 5000);
      }

      // ⑤ 이미지 스캔 (동적 렌더링 대응)
      function scanImages() {
        document.querySelectorAll('img').forEach(attachWatermark);
      }
      scanImages();
      new MutationObserver(scanImages).observe(document.body, { childList: true, subtree: true });

      // ⑥ 감지 트리거 이벤트
      document.addEventListener('keydown', e => {
        const isCopy      = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c';
        const isPrint     = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'p';
        const isMacShot   = e.metaKey && e.shiftKey && ['3','4','5','6'].includes(e.key);
        const isPrintScr  = e.key === 'PrintScreen';
        if (isCopy || isPrint || isMacShot || isPrintScr) triggerWM();
      });

      // 우클릭 시에도 워터마크 강화 (contextmenu는 기본 차단 + 강화)
      document.addEventListener('contextmenu', triggerWM);

      // 탭 전환이 아닌 실제 화면 공유/녹화 감지 (Page Visibility API)
      // — 탭이 완전히 hidden될 때만 (최소화, 다른 앱으로 전환)
      let hiddenCount = 0;
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          hiddenCount++;
          // 짧은 탭 전환은 무시, 2회 이상 반복 시 강화
          if (hiddenCount >= 2) triggerWM();
        }
      });

    })();
  
  </script>
</body>
</html>
